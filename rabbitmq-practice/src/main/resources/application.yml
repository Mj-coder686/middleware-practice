server:
  port: 8083

spring:
  application:
    name: rabbitmq-practice
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    # 发布确认
    publisher-confirm-type: correlated   # 异步确认（推荐）
    publisher-returns: true              # 开启回退消息
    # 消费端配置
    listener:
      simple:
        prefetch: 1                      # 每次只消费 1 条（公平分发）
        acknowledge-mode: manual         # 手动确认
        retry:
          enabled: true                  # 开启重试
          initial-interval: 1000         # 首次重试间隔
          max-attempts: 3                # 最大重试次数
          multiplier: 2                  # 间隔倍数

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
