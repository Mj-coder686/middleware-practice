server:
  port: 8081

spring:
  application:
    name: mybatis-plus-practice
  # 使用 H2 内存数据库，无需安装 MySQL 即可运行
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:mp_practice;DB_CLOSE_DELAY=-1;MODE=MySQL
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
      data-locations: classpath:db/data.sql

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # 控制台打印 SQL
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto           # 主键自增
      logic-delete-field: deleted   # 逻辑删除字段
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath:mapper/*.xml

# Knife4j
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
